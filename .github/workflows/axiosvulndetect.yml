name: Axios Supply Chain Scan

on:
  workflow_dispatch:   # Run only when manually triggered
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check for malicious versions
        run: |
          if grep -qE '"axios":.*(1\.14\.1|0\.30\.4)' package.json package-lock.json yarn.lock || \
             grep -qE '"plain-crypto-js":.*4\.2\.1' package.json package-lock.json yarn.lock; then
            echo "❌ Repository affected: malicious Axios or plain-crypto-js version detected!"
            exit 1
          else
            echo "✅ Repository clean: no malicious Axios versions found."
          fi
